<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ajanda – Günlük Planlayıcı</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e12;
    --surface: #16161e;
    --surface2: #1e1e2a;
    --border: #2a2a38;
    --accent: #e8c97a;
    --accent2: #7ab8e8;
    --accent3: #c47ae8;
    --danger: #e87a7a;
    --success: #7ae8a8;
    --text: #ededf0;
    --muted: #7a7a8c;
    --font-display: 'Playfair Display', serif;
    --font-body: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky; top: 0; z-index: 100;
  }
  .logo {
    font-family: var(--font-display);
    font-size: 1.6rem;
    color: var(--accent);
    letter-spacing: 1px;
  }
  .logo span { color: var(--text); font-weight: 400; }
  .nav-tabs { display: flex; gap: 6px; }
  .nav-tab {
    padding: 8px 18px;
    border-radius: 8px;
    border: 1px solid transparent;
    background: none;
    color: var(--muted);
    font-family: var(--font-body);
    font-size: .875rem;
    font-weight: 500;
    cursor: pointer;
    transition: all .2s;
  }
  .nav-tab:hover { color: var(--text); background: var(--surface2); }
  .nav-tab.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .date-display { font-size: .85rem; color: var(--muted); text-align: right; }
  .date-display strong { display: block; color: var(--text); font-size: 1rem; }

  /* ── MAIN LAYOUT ── */
  main { flex: 1; padding: 28px 32px; max-width: 1200px; margin: 0 auto; width: 100%; }

  .panel { display: none; animation: fadeIn .3s ease; }
  .panel.active { display: block; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

  /* ── SECTION HEADER ── */
  .section-hdr {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px;
  }
  .section-hdr h2 {
    font-family: var(--font-display);
    font-size: 1.8rem; font-weight: 700;
    color: var(--accent);
  }
  .btn-primary {
    background: var(--accent); color: var(--bg);
    border: none; border-radius: 8px;
    padding: 10px 20px; font-family: var(--font-body);
    font-size: .875rem; font-weight: 600; cursor: pointer;
    transition: all .2s; display: flex; align-items: center; gap: 6px;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(232,201,122,.3); }
  .btn-secondary {
    background: var(--surface2); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 16px; font-family: var(--font-body);
    font-size: .875rem; cursor: pointer; transition: all .2s;
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

  /* ── CALENDAR PANEL ── */
  .cal-grid { display: grid; grid-template-columns: 1fr 340px; gap: 24px; }

  .calendar-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px; padding: 24px;
  }
  .cal-nav {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .cal-nav h3 {
    font-family: var(--font-display); font-size: 1.3rem; color: var(--text);
  }
  .cal-nav-btn {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: 8px; width: 36px; height: 36px;
    cursor: pointer; font-size: 1rem; transition: all .2s;
  }
  .cal-nav-btn:hover { border-color: var(--accent); color: var(--accent); }

  .day-labels {
    display: grid; grid-template-columns: repeat(7,1fr);
    gap: 4px; margin-bottom: 8px;
  }
  .day-label {
    text-align: center; font-size: .72rem; font-weight: 600;
    color: var(--muted); text-transform: uppercase; letter-spacing: .5px;
    padding: 4px;
  }
  .cal-days {
    display: grid; grid-template-columns: repeat(7,1fr); gap: 4px;
  }
  .cal-day {
    aspect-ratio: 1; border-radius: 10px; border: 1px solid transparent;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; font-size: .875rem; position: relative;
    transition: all .15s; color: var(--text);
    background: none;
  }
  .cal-day:hover { background: var(--surface2); border-color: var(--border); }
  .cal-day.today { border-color: var(--accent); color: var(--accent); font-weight: 700; }
  .cal-day.selected { background: var(--accent); color: var(--bg); font-weight: 700; }
  .cal-day.other-month { color: var(--muted); }
  .cal-day.has-event::after {
    content: ''; position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%);
    width: 4px; height: 4px; border-radius: 50%; background: var(--accent2);
  }
  .cal-day.selected.has-event::after { background: var(--bg); }

  /* Day sidebar */
  .day-sidebar {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 24px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .day-sidebar h3 {
    font-family: var(--font-display); font-size: 1.1rem; color: var(--accent);
  }
  .event-item {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px;
    display: flex; align-items: flex-start; gap: 12px;
    position: relative; overflow: hidden;
  }
  .event-item::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; background: var(--accent2);
  }
  .event-item.type-task::before { background: var(--success); }
  .event-item.type-reminder::before { background: var(--accent); }
  .event-time { font-size: .78rem; color: var(--muted); white-space: nowrap; font-weight: 600; }
  .event-title { font-size: .9rem; font-weight: 500; flex: 1; }
  .event-del {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: .85rem; padding: 2px 4px; border-radius: 4px; transition: color .2s;
  }
  .event-del:hover { color: var(--danger); }
  .no-events { color: var(--muted); font-size: .875rem; text-align: center; padding: 20px 0; }

  /* ── TASKS PANEL ── */
  .tasks-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .task-col { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; }
  .task-col-title {
    font-size: .75rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
  }
  .badge {
    background: var(--surface2); color: var(--muted);
    border-radius: 20px; padding: 2px 8px; font-size: .7rem;
  }
  .task-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 0; border-bottom: 1px solid var(--border);
    animation: fadeIn .2s ease;
  }
  .task-item:last-child { border-bottom: none; }
  .task-check {
    width: 18px; height: 18px; border: 2px solid var(--border);
    border-radius: 50%; flex-shrink: 0; cursor: pointer;
    transition: all .2s; margin-top: 2px; appearance: none;
    -webkit-appearance: none; background: none;
  }
  .task-check:checked {
    background: var(--success); border-color: var(--success);
    background-image: url("data:image/svg+xml,%3Csvg width='10' height='8' viewBox='0 0 10 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 4L3.5 6.5L9 1' stroke='%230e0e12' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat; background-position: center;
  }
  .task-text { flex: 1; font-size: .9rem; }
  .task-text.done { text-decoration: line-through; color: var(--muted); }
  .task-meta { font-size: .72rem; color: var(--muted); margin-top: 2px; }
  .priority-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 6px;
  }
  .p-high { background: var(--danger); }
  .p-med  { background: var(--accent); }
  .p-low  { background: var(--success); }

  /* ── NOTES PANEL ── */
  .notes-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }
  .note-card {
    border-radius: 14px; padding: 20px;
    position: relative; overflow: hidden;
    border: 1px solid var(--border);
    animation: fadeIn .3s ease;
    cursor: pointer;
    transition: transform .2s, box-shadow .2s;
  }
  .note-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,.4); }
  .note-card.c0 { background: #1a1a26; }
  .note-card.c1 { background: #1a2226; }
  .note-card.c2 { background: #221a26; }
  .note-card.c3 { background: #261a1a; }
  .note-card.c4 { background: #1a2618; }
  .note-title { font-family: var(--font-display); font-size: 1.05rem; margin-bottom: 8px; }
  .note-body { font-size: .875rem; color: var(--muted); line-height: 1.6; }
  .note-date { font-size: .72rem; color: var(--muted); margin-top: 12px; }
  .note-del {
    position: absolute; top: 12px; right: 12px;
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: .9rem; opacity: 0; transition: opacity .2s;
  }
  .note-card:hover .note-del { opacity: 1; }
  .note-del:hover { color: var(--danger); }
  .note-add-card {
    border: 2px dashed var(--border); border-radius: 14px; padding: 20px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--muted); font-size: .9rem; gap: 8px;
    transition: all .2s; min-height: 120px;
  }
  .note-add-card:hover { border-color: var(--accent); color: var(--accent); }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; backdrop-filter: blur(4px);
    animation: fadeIn .2s ease;
  }
  .modal-overlay.hidden { display: none; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 32px; width: 100%; max-width: 480px;
    animation: slideUp .25s ease;
  }
  @keyframes slideUp { from { transform: translateY(20px); opacity:0; } to { transform:none; opacity:1; } }
  .modal h3 { font-family: var(--font-display); font-size: 1.4rem; margin-bottom: 24px; color: var(--accent); }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: .8rem; font-weight: 600; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; }
  .form-control {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px; color: var(--text);
    font-family: var(--font-body); font-size: .9rem; transition: border-color .2s;
  }
  .form-control:focus { outline: none; border-color: var(--accent); }
  textarea.form-control { resize: vertical; min-height: 90px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

  /* ── NOTIFICATIONS ── */
  .notif-container {
    position: fixed; top: 80px; right: 20px; z-index: 300;
    display: flex; flex-direction: column; gap: 10px; pointer-events: none;
  }
  .notif {
    background: var(--surface); border: 1px solid var(--accent);
    border-radius: 12px; padding: 14px 18px; max-width: 320px;
    box-shadow: 0 8px 24px rgba(0,0,0,.5);
    animation: slideLeft .3s ease;
    pointer-events: all;
    display: flex; align-items: flex-start; gap: 12px;
  }
  @keyframes slideLeft { from { transform: translateX(100%); opacity:0; } to { transform:none; opacity:1; } }
  .notif-icon { font-size: 1.2rem; flex-shrink: 0; }
  .notif-text strong { display: block; font-size: .9rem; margin-bottom: 2px; }
  .notif-text span { font-size: .8rem; color: var(--muted); }
  .notif-close { background: none; border: none; color: var(--muted); cursor: pointer; margin-left: auto; }

  /* ── OVERVIEW PANEL (HOME) ── */
  .overview-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 28px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 20px;
  }
  .stat-card .stat-label { font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin-bottom: 8px; }
  .stat-card .stat-value { font-family: var(--font-display); font-size: 2rem; color: var(--accent); }
  .stat-card .stat-sub { font-size: .8rem; color: var(--muted); margin-top: 4px; }
  .today-events-wrap {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 24px;
  }
  .today-events-wrap h3 { font-family: var(--font-display); font-size: 1.2rem; color: var(--accent); margin-bottom: 16px; }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    header { padding: 12px 16px; }
    main { padding: 16px; }
    .cal-grid, .tasks-layout, .overview-grid { grid-template-columns: 1fr; }
    .nav-tabs { flex-wrap: wrap; }
  }

  select.form-control option { background: var(--surface2); }

  .empty-state {
    text-align: center; padding: 40px 20px; color: var(--muted);
  }
  .empty-state .empty-icon { font-size: 3rem; margin-bottom: 12px; }
  .empty-state p { font-size: .9rem; }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">Ajanda<span>.</span></div>
  <nav class="nav-tabs">
    <button class="nav-tab active" onclick="switchTab('overview')">🏠 Genel Bakış</button>
    <button class="nav-tab" onclick="switchTab('calendar')">📅 Takvim</button>
    <button class="nav-tab" onclick="switchTab('tasks')">✅ Görevler</button>
    <button class="nav-tab" onclick="switchTab('notes')">📝 Notlar</button>
  </nav>
  <div class="date-display">
    <span id="live-time"></span>
    <strong id="live-date"></strong>
  </div>
</header>

<main>

  <!-- OVERVIEW -->
  <div class="panel active" id="panel-overview">
    <div class="section-hdr">
      <h2>Günaydın 👋</h2>
    </div>
    <div class="overview-grid">
      <div class="stat-card">
        <div class="stat-label">Bugünkü Etkinlikler</div>
        <div class="stat-value" id="stat-events">0</div>
        <div class="stat-sub">randevu & hatırlatma</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Bekleyen Görevler</div>
        <div class="stat-value" id="stat-tasks">0</div>
        <div class="stat-sub">tamamlanmamış</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Toplam Not</div>
        <div class="stat-value" id="stat-notes">0</div>
        <div class="stat-sub">kaydedilmiş</div>
      </div>
    </div>
    <div class="today-events-wrap">
      <h3>Bugün – <span id="overview-date-label"></span></h3>
      <div id="overview-today-events"></div>
    </div>
  </div>

  <!-- CALENDAR -->
  <div class="panel" id="panel-calendar">
    <div class="section-hdr">
      <h2>Takvim</h2>
      <button class="btn-primary" onclick="openModal('event')">+ Etkinlik Ekle</button>
    </div>
    <div class="cal-grid">
      <div class="calendar-wrap">
        <div class="cal-nav">
          <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
          <h3 id="cal-month-label"></h3>
          <button class="cal-nav-btn" onclick="changeMonth(1)">›</button>
        </div>
        <div class="day-labels">
          <div class="day-label">Pzt</div>
          <div class="day-label">Sal</div>
          <div class="day-label">Çar</div>
          <div class="day-label">Per</div>
          <div class="day-label">Cum</div>
          <div class="day-label">Cmt</div>
          <div class="day-label">Paz</div>
        </div>
        <div class="cal-days" id="cal-days"></div>
      </div>
      <div class="day-sidebar">
        <h3 id="sidebar-date-label">Bir gün seçin</h3>
        <div id="sidebar-events">
          <div class="no-events">Seçili günde etkinlik yok</div>
        </div>
        <button class="btn-primary" style="width:100%;justify-content:center;margin-top:auto;" onclick="openModal('event')">+ Etkinlik Ekle</button>
      </div>
    </div>
  </div>

  <!-- TASKS -->
  <div class="panel" id="panel-tasks">
    <div class="section-hdr">
      <h2>Görevler</h2>
      <button class="btn-primary" onclick="openModal('task')">+ Görev Ekle</button>
    </div>
    <div class="tasks-layout">
      <div class="task-col">
        <div class="task-col-title" style="color:var(--accent2)">⏳ Yapılacak <span class="badge" id="badge-pending">0</span></div>
        <div id="tasks-pending"></div>
      </div>
      <div class="task-col">
        <div class="task-col-title" style="color:var(--success)">✓ Tamamlananlar <span class="badge" id="badge-done">0</span></div>
        <div id="tasks-done"></div>
      </div>
    </div>
  </div>

  <!-- NOTES -->
  <div class="panel" id="panel-notes">
    <div class="section-hdr">
      <h2>Notlar</h2>
    </div>
    <div class="notes-grid" id="notes-grid"></div>
  </div>

</main>

<!-- NOTIFICATIONS -->
<div class="notif-container" id="notif-container"></div>

<!-- MODAL -->
<div class="modal-overlay hidden" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal" id="modal">
    <h3 id="modal-title">Etkinlik Ekle</h3>
    <div id="modal-body"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">İptal</button>
      <button class="btn-primary" id="modal-save-btn">Kaydet</button>
    </div>
  </div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────────────
const state = {
  events: JSON.parse(localStorage.getItem('aj_events') || '[]'),
  tasks:  JSON.parse(localStorage.getItem('aj_tasks')  || '[]'),
  notes:  JSON.parse(localStorage.getItem('aj_notes')  || '[]'),
  selectedDate: new Date(),
  viewMonth: new Date(),
};

function save() {
  localStorage.setItem('aj_events', JSON.stringify(state.events));
  localStorage.setItem('aj_tasks',  JSON.stringify(state.tasks));
  localStorage.setItem('aj_notes',  JSON.stringify(state.notes));
}

// ── HELPERS ───────────────────────────────────────────────────────
const monthNames = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
const dayNamesShort = ['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'];

function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function todayKey() { return dateKey(new Date()); }
function fmtDate(d) {
  const dt = new Date(d);
  return `${dt.getDate()} ${monthNames[dt.getMonth()]} ${dt.getFullYear()}`;
}
function uid() { return Math.random().toString(36).slice(2); }

// ── CLOCK ─────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById('live-time').textContent =
    now.toLocaleTimeString('tr-TR', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('live-date').textContent =
    now.toLocaleDateString('tr-TR', {weekday:'long', day:'numeric', month:'long'});
}
setInterval(updateClock, 1000);
updateClock();

// ── TAB SWITCH ────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  event.currentTarget.classList.add('active');
  if (tab === 'calendar') renderCalendar();
  if (tab === 'tasks')    renderTasks();
  if (tab === 'notes')    renderNotes();
  if (tab === 'overview') renderOverview();
}

// ── OVERVIEW ──────────────────────────────────────────────────────
function renderOverview() {
  const today = todayKey();
  const todayEvents = state.events.filter(e => e.date === today);
  const pendingTasks = state.tasks.filter(t => !t.done);
  document.getElementById('stat-events').textContent = todayEvents.length;
  document.getElementById('stat-tasks').textContent  = pendingTasks.length;
  document.getElementById('stat-notes').textContent  = state.notes.length;

  const now = new Date();
  document.getElementById('overview-date-label').textContent =
    now.toLocaleDateString('tr-TR', {weekday:'long', day:'numeric', month:'long'});

  const container = document.getElementById('overview-today-events');
  if (todayEvents.length === 0) {
    container.innerHTML = '<div class="no-events">Bugün için etkinlik yok</div>';
    return;
  }
  container.innerHTML = todayEvents.sort((a,b) => a.time.localeCompare(b.time)).map(e =>
    `<div class="event-item type-${e.type}" style="margin-bottom:8px">
      <div>
        <div class="event-time">${e.time}</div>
        <div class="event-title">${e.title}</div>
        ${e.note ? `<div style="font-size:.78rem;color:var(--muted);margin-top:4px">${e.note}</div>` : ''}
      </div>
    </div>`
  ).join('');
}

// ── CALENDAR ──────────────────────────────────────────────────────
function renderCalendar() {
  const vm = state.viewMonth;
  const year = vm.getFullYear();
  const month = vm.getMonth();
  document.getElementById('cal-month-label').textContent = `${monthNames[month]} ${year}`;

  const firstDay = new Date(year, month, 1);
  // week starts Monday (0=Mon..6=Sun)
  let startDow = (firstDay.getDay() + 6) % 7;
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const prevDays = new Date(year, month, 0).getDate();

  const eventDates = new Set(state.events.map(e => e.date));
  const today = todayKey();
  const selKey = dateKey(state.selectedDate);

  let html = '';
  // previous month days
  for (let i = startDow - 1; i >= 0; i--) {
    const d = prevDays - i;
    html += `<button class="cal-day other-month">${d}</button>`;
  }
  // current month
  for (let d = 1; d <= daysInMonth; d++) {
    const key = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    let cls = 'cal-day';
    if (key === today)  cls += ' today';
    if (key === selKey) cls += ' selected';
    if (eventDates.has(key)) cls += ' has-event';
    html += `<button class="${cls}" onclick="selectDay(${year},${month},${d})">${d}</button>`;
  }
  // next month
  const total = startDow + daysInMonth;
  const rem = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let d = 1; d <= rem; d++) {
    html += `<button class="cal-day other-month">${d}</button>`;
  }

  document.getElementById('cal-days').innerHTML = html;
  renderSidebar();
}

function selectDay(y, m, d) {
  state.selectedDate = new Date(y, m, d);
  renderCalendar();
}

function changeMonth(dir) {
  const vm = state.viewMonth;
  state.viewMonth = new Date(vm.getFullYear(), vm.getMonth() + dir, 1);
  renderCalendar();
}

function renderSidebar() {
  const key = dateKey(state.selectedDate);
  const events = state.events.filter(e => e.date === key).sort((a,b) => a.time.localeCompare(b.time));
  document.getElementById('sidebar-date-label').textContent =
    state.selectedDate.toLocaleDateString('tr-TR', {weekday:'long', day:'numeric', month:'long'});

  const cont = document.getElementById('sidebar-events');
  if (events.length === 0) {
    cont.innerHTML = '<div class="no-events">Bu günde etkinlik yok</div>';
    return;
  }
  cont.innerHTML = events.map(e =>
    `<div class="event-item type-${e.type}" style="cursor:pointer" onclick="openModal('event-edit','${e.id}')">
      <div style="flex:1">
        <div class="event-time">${e.time}</div>
        <div class="event-title">${e.title}</div>
        ${e.note ? `<div style="font-size:.75rem;color:var(--muted);margin-top:3px">${e.note}</div>` : ''}
      </div>
      <div style="display:flex;flex-direction:column;gap:4px">
        <button class="event-del" onclick="event.stopPropagation();openModal('event-edit','${e.id}')" title="Düzenle">✏️</button>
        <button class="event-del" onclick="event.stopPropagation();deleteEvent('${e.id}')" title="Sil">✕</button>
      </div>
    </div>`
  ).join('');
}

function deleteEvent(id) {
  state.events = state.events.filter(e => e.id !== id);
  save(); renderCalendar(); renderOverview();
}

// ── TASKS ─────────────────────────────────────────────────────────
function renderTasks() {
  const pending = state.tasks.filter(t => !t.done);
  const done    = state.tasks.filter(t =>  t.done);
  document.getElementById('badge-pending').textContent = pending.length;
  document.getElementById('badge-done').textContent    = done.length;

  const renderList = (tasks, container) => {
    if (tasks.length === 0) {
      document.getElementById(container).innerHTML =
        `<div class="empty-state"><div class="empty-icon">${container==='tasks-pending'?'🎯':'🎉'}</div><p>${container==='tasks-pending'?'Harika! Bekleyen görev yok.':'Henüz tamamlanan görev yok.'}</p></div>`;
      return;
    }
    document.getElementById(container).innerHTML = tasks.map(t =>
      `<div class="task-item">
        <div class="priority-dot p-${t.priority}"></div>
        <input type="checkbox" class="task-check" ${t.done?'checked':''} onchange="toggleTask('${t.id}')">
        <div style="flex:1;cursor:pointer" onclick="openModal('task-edit','${t.id}')">
          <div class="task-text ${t.done?'done':''}">${t.title}</div>
          ${t.due ? `<div class="task-meta">📅 ${fmtDate(t.due)}</div>` : ''}
          ${t.note ? `<div class="task-meta">📌 ${t.note}</div>` : ''}
        </div>
        <button class="event-del" onclick="openModal('task-edit','${t.id}')" title="Düzenle" style="margin-right:2px">✏️</button>
        <button class="event-del" onclick="deleteTask('${t.id}')" title="Sil">✕</button>
      </div>`
    ).join('');
  };

  renderList(pending, 'tasks-pending');
  renderList(done,    'tasks-done');
}

function toggleTask(id) {
  const t = state.tasks.find(t => t.id === id);
  if (t) { t.done = !t.done; save(); renderTasks(); renderOverview(); }
}

function deleteTask(id) {
  state.tasks = state.tasks.filter(t => t.id !== id);
  save(); renderTasks(); renderOverview();
}

// ── NOTES ─────────────────────────────────────────────────────────
function renderNotes() {
  const grid = document.getElementById('notes-grid');
  let html = state.notes.map((n, i) =>
    `<div class="note-card c${i % 5}" onclick="openModal('note-edit','${n.id}')">
      <button class="note-del" onclick="event.stopPropagation();deleteNote('${n.id}')">✕</button>
      <div class="note-title">${n.title || 'Başlıksız Not'}</div>
      <div class="note-body">${(n.body||'').substring(0,120)}${(n.body||'').length>120?'…':''}</div>
      <div class="note-date">${fmtDate(n.created)}</div>
    </div>`
  ).join('');
  html += `<div class="note-add-card" onclick="openModal('note')">＋ Yeni Not</div>`;
  grid.innerHTML = html;
}

function deleteNote(id) {
  state.notes = state.notes.filter(n => n.id !== id);
  save(); renderNotes(); renderOverview();
}

// ── MODAL ─────────────────────────────────────────────────────────
let currentModalType = null;
let currentEditId = null;

function openModal(type, editId = null) {
  currentModalType = type;
  currentEditId = editId;
  const overlay = document.getElementById('modal-overlay');
  overlay.classList.remove('hidden');

  if (type === 'event' || type === 'event-edit') {
    const existing = editId ? state.events.find(e => e.id === editId) : null;
    const selDate = existing ? existing.date : dateKey(state.selectedDate);
    document.getElementById('modal-title').textContent = existing ? 'Etkinliği Düzenle' : 'Etkinlik Ekle';
    document.getElementById('modal-body').innerHTML = `
      <div class="form-group">
        <label>Başlık</label>
        <input id="f-title" class="form-control" placeholder="Toplantı, doğum günü..." value="${existing?.title||''}">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Tarih</label>
          <input id="f-date" type="date" class="form-control" value="${existing?.date||selDate}">
        </div>
        <div class="form-group">
          <label>Saat</label>
          <input id="f-time" type="time" class="form-control" value="${existing?.time||'09:00'}">
        </div>
      </div>
      <div class="form-group">
        <label>Tür</label>
        <select id="f-type" class="form-control">
          <option value="event" ${existing?.type==='event'?'selected':''}>Randevu / Etkinlik</option>
          <option value="reminder" ${existing?.type==='reminder'?'selected':''}>Hatırlatma</option>
          <option value="task" ${existing?.type==='task'?'selected':''}>Görev</option>
        </select>
      </div>
      <div class="form-group">
        <label>Not (opsiyonel)</label>
        <textarea id="f-note" class="form-control" placeholder="Açıklama...">${existing?.note||''}</textarea>
      </div>
      <div class="form-group">
        <label>Bildirim</label>
        <select id="f-reminder" class="form-control">
          <option value="0" ${!existing?.reminder?'selected':''}>Bildirim yok</option>
          <option value="5" ${existing?.reminder==5?'selected':''}>5 dakika önce</option>
          <option value="15" ${existing?.reminder==15?'selected':''}>15 dakika önce</option>
          <option value="30" ${existing?.reminder==30?'selected':''}>30 dakika önce</option>
          <option value="60" ${existing?.reminder==60?'selected':''}>1 saat önce</option>
          <option value="1440" ${existing?.reminder==1440?'selected':''}>1 gün önce</option>
        </select>
      </div>`;
    document.getElementById('modal-save-btn').onclick = saveEvent;
  }

  else if (type === 'task' || type === 'task-edit') {
    const existing = editId ? state.tasks.find(t => t.id === editId) : null;
    document.getElementById('modal-title').textContent = existing ? 'Görevi Düzenle' : 'Görev Ekle';
    document.getElementById('modal-body').innerHTML = `
      <div class="form-group">
        <label>Görev Adı</label>
        <input id="f-title" class="form-control" placeholder="Yapılacak iş..." value="${existing?.title||''}">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Son Tarih</label>
          <input id="f-due" type="date" class="form-control" value="${existing?.due||''}">
        </div>
        <div class="form-group">
          <label>Öncelik</label>
          <select id="f-priority" class="form-control">
            <option value="high" ${existing?.priority==='high'?'selected':''}>🔴 Yüksek</option>
            <option value="med" ${!existing||existing?.priority==='med'?'selected':''}>🟡 Orta</option>
            <option value="low" ${existing?.priority==='low'?'selected':''}>🟢 Düşük</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Not</label>
        <textarea id="f-note" class="form-control" placeholder="Açıklama...">${existing?.note||''}</textarea>
      </div>`;
    document.getElementById('modal-save-btn').onclick = saveTask;
  }

  else if (type === 'note' || type === 'note-edit') {
    const existing = editId ? state.notes.find(n => n.id === editId) : null;
    document.getElementById('modal-title').textContent = existing ? 'Notu Düzenle' : 'Not Ekle';
    document.getElementById('modal-body').innerHTML = `
      <div class="form-group">
        <label>Başlık</label>
        <input id="f-title" class="form-control" placeholder="Not başlığı..." value="${existing?.title||''}">
      </div>
      <div class="form-group">
        <label>Not</label>
        <textarea id="f-body" class="form-control" style="min-height:160px" placeholder="Notunuzu yazın...">${existing?.body||''}</textarea>
      </div>`;
    document.getElementById('modal-save-btn').onclick = saveNote;
  }
}

function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); }
function closeModalOutside(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }

function saveEvent() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { alert('Başlık gerekli!'); return; }
  if (currentEditId) {
    const ev = state.events.find(e => e.id === currentEditId);
    if (ev) {
      ev.title    = title;
      ev.date     = document.getElementById('f-date').value;
      ev.time     = document.getElementById('f-time').value;
      ev.type     = document.getElementById('f-type').value;
      ev.note     = document.getElementById('f-note').value.trim();
      ev.reminder = parseInt(document.getElementById('f-reminder').value);
      scheduleNotification(ev);
    }
    save(); closeModal(); renderCalendar(); renderOverview();
    showNotif('🗓️', 'Etkinlik Güncellendi', title);
  } else {
    const ev = {
      id: uid(), title,
      date: document.getElementById('f-date').value,
      time: document.getElementById('f-time').value,
      type: document.getElementById('f-type').value,
      note: document.getElementById('f-note').value.trim(),
      reminder: parseInt(document.getElementById('f-reminder').value),
      created: new Date().toISOString()
    };
    state.events.push(ev);
    save(); closeModal(); renderCalendar(); renderOverview();
    scheduleNotification(ev);
    showNotif('🗓️', 'Etkinlik Eklendi', ev.title);
  }
}

function saveTask() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { alert('Görev adı gerekli!'); return; }
  if (currentEditId) {
    const t = state.tasks.find(t => t.id === currentEditId);
    if (t) {
      t.title    = title;
      t.due      = document.getElementById('f-due').value;
      t.priority = document.getElementById('f-priority').value;
      t.note     = document.getElementById('f-note').value.trim();
    }
    save(); closeModal(); renderTasks(); renderOverview();
    showNotif('✅', 'Görev Güncellendi', title);
  } else {
    state.tasks.push({
      id: uid(), title, done: false,
      due: document.getElementById('f-due').value,
      priority: document.getElementById('f-priority').value,
      note: document.getElementById('f-note').value.trim(),
      created: new Date().toISOString()
    });
    save(); closeModal(); renderTasks(); renderOverview();
    showNotif('✅', 'Görev Eklendi', title);
  }
}

function saveNote() {
  const title = document.getElementById('f-title').value.trim();
  const body  = document.getElementById('f-body').value.trim();
  if (currentEditId) {
    const n = state.notes.find(n => n.id === currentEditId);
    if (n) { n.title = title; n.body = body; }
  } else {
    state.notes.push({ id: uid(), title, body, created: new Date().toISOString() });
  }
  save(); closeModal(); renderNotes(); renderOverview();
  showNotif('📝', currentEditId ? 'Not Güncellendi' : 'Not Eklendi', title || 'Başlıksız Not');
}

// ── NOTIFICATIONS ─────────────────────────────────────────────────
function showNotif(icon, title, body, duration = 4000) {
  const container = document.getElementById('notif-container');
  const el = document.createElement('div');
  el.className = 'notif';
  el.innerHTML = `
    <div class="notif-icon">${icon}</div>
    <div class="notif-text">
      <strong>${title}</strong>
      <span>${body}</span>
    </div>
    <button class="notif-close" onclick="this.parentElement.remove()">✕</button>`;
  container.appendChild(el);
  setTimeout(() => el.remove(), duration);
}

function scheduleNotification(ev) {
  if (!ev.reminder || ev.reminder === 0) return;
  const [h, m] = ev.time.split(':').map(Number);
  const evDate = new Date(ev.date);
  evDate.setHours(h, m, 0, 0);
  const notifTime = evDate.getTime() - ev.reminder * 60000;
  const delay = notifTime - Date.now();
  if (delay > 0 && delay < 86400000 * 2) {
    setTimeout(() => {
      showNotif('🔔', 'Hatırlatma!', ev.title, 8000);
      if ('Notification' in window && Notification.permission === 'granted') {
        new Notification('Ajanda Hatırlatma', { body: ev.title });
      }
    }, delay);
  }
}

// Request notification permission
if ('Notification' in window && Notification.permission === 'default') {
  setTimeout(() => {
    showNotif('🔔', 'Bildirim İzni', 'Hatırlatmalar için izin verin', 6000);
    Notification.requestPermission();
  }, 2000);
}

// Reschedule existing event reminders on load
state.events.forEach(ev => scheduleNotification(ev));

// ── CHECK TODAY REMINDERS ──────────────────────────────────────────
function checkTodayReminders() {
  const today = todayKey();
  const now = new Date();
  state.events.filter(e => e.date === today).forEach(e => {
    const [h, m] = e.time.split(':').map(Number);
    const evTime = new Date(); evTime.setHours(h, m, 0, 0);
    const diff = evTime - now;
    if (diff > 0 && diff < 60000) {
      showNotif('⏰', 'Şimdi!', e.title, 10000);
    }
  });
}
setInterval(checkTodayReminders, 30000);

// ── INITIAL RENDER ────────────────────────────────────────────────
renderOverview();

// Add sample data if empty
if (state.events.length === 0 && state.tasks.length === 0 && state.notes.length === 0) {
  const today = todayKey();
  state.events.push(
    { id: uid(), title: 'Doktor Randevusu', date: today, time: '10:00', type: 'reminder', note: 'Genel kontrol', reminder: 30, created: new Date().toISOString() },
    { id: uid(), title: 'Proje Toplantısı', date: today, time: '14:00', type: 'event', note: 'Zoom linki e-postada', reminder: 15, created: new Date().toISOString() }
  );
  state.tasks.push(
    { id: uid(), title: 'Raporu tamamla', done: false, due: today, priority: 'high', note: 'İnsan kaynakları için', created: new Date().toISOString() },
    { id: uid(), title: 'Alışveriş listesi hazırla', done: false, due: '', priority: 'low', note: '', created: new Date().toISOString() },
    { id: uid(), title: 'E-postaları yanıtla', done: true, due: '', priority: 'med', note: '', created: new Date().toISOString() }
  );
  state.notes.push(
    { id: uid(), title: 'Proje Fikirleri', body: 'Yeni proje için beyin fırtınası: mobil uygulama geliştirme, kullanıcı deneyimi iyileştirmeleri, performans optimizasyonu.', created: new Date().toISOString() },
    { id: uid(), title: 'Alışveriş', body: 'Süt, yumurta, ekmek, sebze, meyve, kahve, çay.', created: new Date().toISOString() }
  );
  save();
  renderOverview();
}
</script>
